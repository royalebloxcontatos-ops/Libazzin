<!DOCTYPE html>

<head>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: 'Poppins', sans-serif;
}

body {
  height: 100vh;
  background: url('https://i.imgur.com/BB2EKEG.png') no-repeat center/cover;
  display: flex;
  align-items: center;
  justify-content: center;
  color: white;
  overflow: hidden;
}

body::before {
  content: "";
  position: absolute;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, rgba(80,0,120,0.5), rgba(0,0,0,0.95));
}

/* CONTAINER */
.container {
  position: relative;
  z-index: 2;
  background: rgba(25, 0, 40, 0.6);
  backdrop-filter: blur(25px);
  border-radius: 25px;
  padding: 40px;
  width: 380px;
  text-align: center;
  border: 1px solid rgba(178,102,255,0.3);
  box-shadow: 0 0 30px rgba(178,102,255,0.4);
}

/* AVATAR */
.avatar {
  display: block;
  margin: 0 auto 15px;
  width: 100px;
  height: 100px;
  border-radius: 50%;
  border: 3px solid #b266ff;
  object-fit: cover;
  box-shadow: 0 0 20px #b266ff;
}

/* NOME + BADGE CENTRAL */
.name-row {
  display: flex;
  justify-content: center;
  align-items: center;
  gap: 12px;
  margin-bottom: 10px;
}

h1 {
  font-size: 26px;
  color: #e6ccff;
}

/* BADGE JESUS */
.badge {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(60, 0, 90, 0.9);
  border: 1px solid rgba(178,102,255,0.5);
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
  box-shadow: 0 0 15px rgba(178,102,255,0.6);
  animation: float 3s ease-in-out infinite;
}

.badge img {
  width: 16px;
  height: 16px;
}

@keyframes float {
  0%,100% { transform: translateY(0); }
  50% { transform: translateY(-4px); }
}

/* TEXTO */
p {
  font-size: 14px;
  opacity: 0.85;
  margin: 20px 0 25px;
}

/* LINKS */
.links a {
  position: relative;
  display: flex;
  align-items: center;
  gap: 15px;
  text-decoration: none;
  color: white;
  background: rgba(60, 0, 90, 0.6);
  padding: 14px;
  margin: 12px 0;
  border-radius: 14px;
  border: 1px solid rgba(178,102,255,0.3);
  transition: 0.3s;
}

.links img {
  width: 26px;
  height: 26px;
  background: white;
  padding: 4px;
  border-radius: 6px;
}

.links a:hover {
  background: #b266ff;
  color: black;
  transform: translateY(-3px);
  box-shadow: 0 0 20px #b266ff;
}

/* TOOLTIP MELHORADO */
.tooltip::after {
  content: "Use o cupom LBZ";
  position: absolute;
  right: 15px;
  top: -30px;
  background: rgba(20,0,40,0.95);
  border: 1px solid #b266ff;
  color: #fff;
  padding: 6px 10px;
  border-radius: 8px;
  font-size: 12px;
  opacity: 0;
  transition: 0.3s;
  white-space: nowrap;
  box-shadow: 0 0 10px #b266ff;
}

.tooltip:hover::after {
  opacity: 1;
  transform: translateY(-5px);
}

/* FOOTER */
.footer {
  margin-top: 20px;
  font-size: 12px;
  opacity: 0.5;
}

/* CHUVA */
.rain {
  position: absolute;
  width: 100%;
  height: 100%;
  pointer-events: none;
}

.drop {
  position: absolute;
  bottom: 100%;
  width: 2px;
  height: 18px;
  background: linear-gradient(transparent, #b266ff);
  animation: rain linear infinite;
  opacity: 0.5;
}

@keyframes rain {
  to {
    transform: translateY(110vh);
  }
}
</style>
</head>

<div class="rain" id="rain"></div>

<script>
const rain = document.getElementById("rain");

for (let i = 0; i < 100; i++) {
  let drop = document.createElement("div");
  drop.classList.add("drop");

  drop.style.left = Math.random() * 100 + "vw";
  drop.style.animationDuration = (0.7 + Math.random()) + "s";
  drop.style.opacity = Math.random();

  rain.appendChild(drop);
}
</script>
